  /deploy/targets/{targetId}/uninstall:
    post:
      operationId: uninstallDeploymentTarget
      tags: [deploy]
      summary: ⏳ Uninstall a deployment target
      parameters:
        - $ref: "#/components/parameters/targetId"
      responses:
        "200":
          description: DeploymentTargetActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentTargetActionResponse"

  /deploy/gateway/restart:
    post:
      operationId: restartGateway
      tags: [deploy]
      summary: ⏳ Restart the OpenClaw gateway
      responses:
        "200":
          description: GatewayActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayActionResponse"

  # ── Install (legacy) ──────────────────────────────────────────────────────

  /install:
    post:
      operationId: installEngine
      tags: [install]
      summary: ⏳ Install the OpenClaw engine
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallRequest"
      responses:
        "200":
          description: Install result with overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  install:
                    $ref: "#/components/schemas/InstallResponse"
                  overview:
                    $ref: "#/components/schemas/ProductOverview"

  /engine/uninstall:
    post:
      operationId: uninstallEngine
      tags: [install]
      summary: ⏳ Uninstall the OpenClaw engine
      responses:
        "200":
          description: Uninstall result with overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/EngineActionResponse"
                  overview:
                    $ref: "#/components/schemas/ProductOverview"

  /engine/update:
    post:
      operationId: updateEngine
      tags: [install]
      summary: ⏳ Update the OpenClaw engine (canonical path)
      responses:
        "200":
          description: Update result
