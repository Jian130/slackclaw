      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingEmployeeState"
      responses:
        "200":
          description: OnboardingStateResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStateResponse"

  /onboarding/reset:
    post:
      operationId: resetOnboarding
      tags: [onboarding]
