  /deploy/targets/{targetId}/update:
    post:
      operationId: updateDeploymentTarget
      tags: [deploy]
      summary: ⏳ Update a deployment target
      parameters:
        - $ref: "#/components/parameters/targetId"
      responses:
        "200":
          description: DeploymentTargetActionResponse
          content:
            application/json:
              schema:
