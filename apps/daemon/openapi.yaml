  /onboarding/runtime/detect:
    post:
      operationId: detectOnboardingRuntime
      tags: [onboarding]
      summary: ⏳ Detect an existing compatible OpenClaw runtime
      responses:
        "200":
          description: OnboardingStateResponse
          content:
            application/json:
