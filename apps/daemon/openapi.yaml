      responses:
        "200":
          description: ModelConfigActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelConfigActionResponse"

  /onboarding/model/auth/session/{sessionId}:
    get:
      operationId: getOnboardingModelAuthSession
      tags: [onboarding]
      summary: Poll an interactive model auth session during onboarding
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
