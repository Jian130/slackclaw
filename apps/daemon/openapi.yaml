      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingRequest"
      responses:
        "200":
          description: CompleteOnboardingResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteOnboardingResponse"

  # ── Models ────────────────────────────────────────────────────────────────

  /models/config:
