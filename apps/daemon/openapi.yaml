                $ref: "#/components/schemas/OnboardingStateResponse"

  /onboarding/runtime/install:
    post:
      operationId: installOnboardingRuntime
      tags: [onboarding]
      summary: ⏳ Install OpenClaw runtime during onboarding
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallRequest"
      responses:
        "200":
          description: SetupRunResponse
          content:
            application/json:
              schema:
