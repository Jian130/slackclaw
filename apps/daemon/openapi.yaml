openapi: 3.0.3
info:
  title: ChillClaw Daemon API
  version: "1.0"
  description: |
    Local HTTP API served by the ChillClaw daemon on 127.0.0.1:4545.
    All endpoints return JSON. POST/PATCH/DELETE requests accept a JSON body.

    **WebSocket**: Connect to `ws://127.0.0.1:4545/api/events` for live event push.
    HTTP GET on `/api/events` returns 426 Upgrade Required.

    **Long-running endpoints** (marked ⏳) invoke external processes such as
    install, update, repair, or model download. They can take several minutes.
    Neither the server nor the default fetch() client sets a request timeout,
    which is the primary cause of apparent hangs. Callers should set an
    AbortSignal with a generous timeout (e.g. 10–15 min) and the server should
    set `server.requestTimeout` to a matching value.

    **Stale client routes**: Several routes called in the React client
    (`/channels/telegram`, `/channels/whatsapp/*`, `/channels/wechat`,
    `/channels/feishu` non-callback, `/channels/feishu/prepare`,
    `/channels/feishu/approve`, `/channels/gateway/start`) have no matching
    handler in the daemon and will return 404.

servers:
  - url: http://127.0.0.1:4545/api
    description: Local daemon

tags:
  - name: system
    description: Ping, overview, app control, diagnostics, recovery
  - name: deploy
    description: Deployment targets and gateway lifecycle
  - name: install
    description: Legacy engine install/uninstall/update
  - name: service
    description: macOS LaunchAgent / app-service management
  - name: onboarding
    description: Guided onboarding wizard (intro, setup, and step-by-step state machine)
  - name: models
    description: Model provider config, saved entries, auth, local runtime
  - name: channels
    description: Channel (integration) config and sessions
  - name: plugins
    description: Plugin install, update, remove
  - name: skills
    description: Skill catalog, marketplace, install, update, remove
  - name: tasks
    description: Engine task execution
  - name: chat
    description: Chat threads and messages
  - name: ai-team
    description: AI team overview (member/team mutation routes return 501)

paths:

  # ── System ────────────────────────────────────────────────────────────────

  /ping:
    get:
      operationId: ping
      tags: [system]
      summary: Health check
      responses:
        "200":
          description: Daemon is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }

  /overview:
    get:
      operationId: getOverview
      tags: [system]
      summary: Product overview (health, engine status, recovery actions)
      parameters:
        - $ref: "#/components/parameters/fresh"
      responses:
        "200":
          description: ProductOverview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductOverview"

  /app/update:
    get:
      operationId: getAppUpdate
      tags: [system]
      summary: Current app update status
      parameters:
        - $ref: "#/components/parameters/fresh"
      responses:
        "200":
          description: AppUpdateStatus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUpdateStatus"

  /app/update/check:
    post:
      operationId: checkAppUpdate
      tags: [system]
      summary: Trigger an update check and return the result with a fresh overview
      responses:
        "200":
          description: AppUpdateCheckResponse
          content:
            application/json:
              schema:
                type: object
                properties:
                  appUpdate:
                    $ref: "#/components/schemas/AppUpdateStatus"
                  overview:
                    $ref: "#/components/schemas/ProductOverview"

  /app/stop:
    post:
      operationId: stopApp
      tags: [system]
      summary: Stop the ChillClaw app
      responses:
        "200":
          description: AppControlResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppControlResponse"

  /app/uninstall:
    post:
      operationId: uninstallApp
      tags: [system]
      summary: Uninstall the ChillClaw app
      responses:
        "200":
          description: AppControlResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppControlResponse"

  /diagnostics:
    get:
      operationId: exportDiagnostics
      tags: [system]
      summary: Export a diagnostics bundle to disk
      responses:
        "200":
          description: Path of the written bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  path: { type: string }

  /recovery/{actionId}:
    post:
      operationId: runRecovery
      tags: [system]
      summary: ⏳ Execute a recovery action
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recovery result with updated overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/RecoveryRunResponse"
                  overview:
                    $ref: "#/components/schemas/ProductOverview"
        "404":
          description: Unknown recovery action

  # ── Service ───────────────────────────────────────────────────────────────

  /service/status:
    get:
      operationId: getServiceStatus
      tags: [service]
      summary: macOS LaunchAgent / app-service status
      responses:
        "200":
          description: AppServiceStatus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppServiceStatus"

  /service/install:
    post:
      operationId: installService
      tags: [service]
      summary: Install the app service (LaunchAgent)
      responses:
        "200":
          description: Action result with overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceActionWithOverview"

  /service/restart:
    post:
      operationId: restartService
      tags: [service]
      summary: Restart the app service
      responses:
        "200":
          description: Action result with overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceActionWithOverview"

  /service/uninstall:
    post:
      operationId: uninstallService
      tags: [service]
      summary: Uninstall the app service
      responses:
        "200":
          description: Action result with overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceActionWithOverview"

  # ── Deploy ────────────────────────────────────────────────────────────────

  /deploy/targets:
    get:
      operationId: getDeploymentTargets
      tags: [deploy]
      summary: List all deployment targets and their current status
      responses:
        "200":
          description: DeploymentTargetsResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentTargetsResponse"

  /deploy/targets/{targetId}/install:
    post:
      operationId: installDeploymentTarget
      tags: [deploy]
      summary: ⏳ Install a deployment target
      parameters:
        - $ref: "#/components/parameters/targetId"
