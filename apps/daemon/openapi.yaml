components:
  parameters:
    fresh:
      name: fresh
      in: query
      description: Pass `1` to bypass the read cache and force a fresh read from the engine
      schema:
        type: string
        enum: ["1"]
    targetId:
      name: targetId
      in: path
      required: true
      schema:
        type: string
        enum: [standard, managed-local]
    entryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    pluginId:
      name: pluginId
      in: path
      required: true
      schema:
        type: string
    skillId:
      name: skillId
      in: path
      required: true
      schema:
        type: string
    threadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
    memberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    teamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string

  schemas:

    # ── Shared primitives ──────────────────────────────────────────────────

    Severity:
      type: string
      enum: [ok, info, warning, error]

    MutationSyncMeta:
      type: object
      properties:
        epoch: { type: string }
        revision: { type: integer }
        settled: { type: boolean }

    EngineStatus:
      type: object
      properties:
        engine: { type: string }
        installed: { type: boolean }
        running: { type: boolean }
        version: { type: string }
        summary: { type: string }
        pendingGatewayApply: { type: boolean }
        lastCheckedAt: { type: string, format: date-time }

    RecoveryAction:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        title: { type: string }
        description: { type: string }
        safetyLevel: { type: string, enum: [safe, review, destructive] }
        expectedImpact: { type: string }

    HealthCheckResult:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        severity:
          $ref: "#/components/schemas/Severity"
        summary: { type: string }
        detail: { type: string }
        remediationActionIds:
          type: array
          items: { type: string }

    # ── Overview ──────────────────────────────────────────────────────────

    ProductOverview:
      type: object
      description: Top-level product health and status snapshot
      properties:
        engineStatus:
          $ref: "#/components/schemas/EngineStatus"
        healthChecks:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheckResult"
        recoveryActions:
          type: array
          items:
            $ref: "#/components/schemas/RecoveryAction"
        appUpdate:
          $ref: "#/components/schemas/AppUpdateStatus"

    AppUpdateStatus:
      type: object
      properties:
        status:
          type: string
          enum: [unsupported, up-to-date, update-available, error]
        supported: { type: boolean }
        currentVersion: { type: string }
        latestVersion: { type: string }
        downloadUrl: { type: string }
        releaseUrl: { type: string }
        publishedAt: { type: string, format: date-time }
        checkedAt: { type: string, format: date-time }
        summary: { type: string }
        detail: { type: string }

    AppControlResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string }

    AppServiceStatus:
      type: object
      properties:
        mode:
          type: string
          enum: [launchagent, adhoc, unmanaged]
        installed: { type: boolean }
        running: { type: boolean }
        managedAtLogin: { type: boolean }
        label: { type: string }
        summary: { type: string }
        detail: { type: string }

    AppServiceActionResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string }

    ServiceActionWithOverview:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/AppServiceActionResponse"
        overview:
          $ref: "#/components/schemas/ProductOverview"

    RecoveryRunResponse:
      type: object
      properties:
        actionId: { type: string }
        status: { type: string, enum: [completed, failed] }
        message: { type: string }

    # ── Deploy ────────────────────────────────────────────────────────────

    DeploymentTargetStatus:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        installMode: { type: string }
        installed: { type: boolean }
        installable: { type: boolean }
        planned: { type: boolean }
        recommended: { type: boolean }
        active: { type: boolean }
        version: { type: string }
        desiredVersion: { type: string }
        latestVersion: { type: string }
        updateAvailable: { type: boolean }
        summary: { type: string }
        updateSummary: { type: string }
        requirements:
          type: array
          items: { type: string }

    DeploymentTargetsResponse:
      type: object
      properties:
        checkedAt: { type: string, format: date-time }
        targets:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentTargetStatus"

    DeploymentTargetActionResponse:
      type: object
      properties:
        targetId: { type: string }
        status: { type: string, enum: [completed, failed] }
        message: { type: string }
        engineStatus:
          $ref: "#/components/schemas/EngineStatus"

    GatewayActionResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
        engineStatus:
          $ref: "#/components/schemas/EngineStatus"

    # ── Install ───────────────────────────────────────────────────────────

    InstallRequest:
      type: object
      properties:
        autoConfigure: { type: boolean, default: true }
        forceLocal: { type: boolean, default: false }

    InstallResponse:
      type: object
      properties:
        status: { type: string, enum: [completed, failed] }
        message: { type: string }
        engineStatus:
          $ref: "#/components/schemas/EngineStatus"

    EngineActionResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
        engineStatus:
          $ref: "#/components/schemas/EngineStatus"

    # ── First run / Setup ─────────────────────────────────────────────────

    SetupRunResponse:
      type: object
      properties:
        status: { type: string, enum: [completed, failed] }
        message: { type: string }
        engineStatus:
          $ref: "#/components/schemas/EngineStatus"
        overview:
          $ref: "#/components/schemas/ProductOverview"

    # ── Onboarding ────────────────────────────────────────────────────────

    OnboardingStepNavigationRequest:
      type: object
      properties:
        step: { type: string }

    OnboardingEmployeeState:
      type: object
      additionalProperties: true

    OnboardingStateResponse:
      type: object
      description: Full onboarding wizard state
      additionalProperties: true

    CompleteOnboardingRequest:
      type: object
      additionalProperties: true

    CompleteOnboardingResponse:
      type: object
      properties:
        overview:
          $ref: "#/components/schemas/ProductOverview"

    # ── Models ────────────────────────────────────────────────────────────

    ModelConfigOverview:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ModelProviderConfig"
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelCatalogEntry"
        defaultModel: { type: string }
        configuredModelKeys:
          type: array
          items: { type: string }
        savedEntries:
          type: array
          items:
            $ref: "#/components/schemas/SavedModelEntry"
        defaultEntryId: { type: string }
        fallbackEntryIds:
          type: array
          items: { type: string }
        localRuntime:
          $ref: "#/components/schemas/LocalModelRuntimeOverview"

    ModelProviderConfig:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        description: { type: string }
        configured: { type: boolean }
        modelCount: { type: integer }
        sampleModels:
          type: array
          items: { type: string }

    ModelCatalogEntry:
      type: object
      properties:
        key: { type: string }
        name: { type: string }
        input: { type: string }
        contextWindow: { type: integer }
        local: { type: boolean }
        available: { type: boolean }
        missing: { type: boolean }
        tags:
          type: array
          items: { type: string }

    SavedModelEntry:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        providerId: { type: string }
        modelKey: { type: string }
        agentId: { type: string }
        isDefault: { type: boolean }
        isFallback: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LocalModelRuntimeOverview:
      type: object
      properties:
        supported: { type: boolean }
        status:
          type: string
          enum: [unchecked, idle, installing-runtime, starting-runtime, downloading-model, configuring-openclaw, ready, degraded, cloud-recommended, failed]
        runtimeInstalled: { type: boolean }
        runtimeReachable: { type: boolean }
        modelDownloaded: { type: boolean }
        activeInOpenClaw: { type: boolean }
        summary: { type: string }
        detail: { type: string }
        activeAction: { type: string }
        activePhase: { type: string }
        progressMessage: { type: string }
        progressPercent: { type: number }
        progressCompletedBytes: { type: integer }
        progressTotalBytes: { type: integer }
        lastError: { type: string }
        recoveryHint: { type: string }

    SaveModelEntryRequest:
      type: object
      additionalProperties: true

    SetDefaultModelEntryRequest:
      type: object
      properties:
        entryId: { type: string }

    ReplaceFallbackModelEntriesRequest:
      type: object
      properties:
        entryIds:
          type: array
          items: { type: string }

    ModelAuthRequest:
      type: object
      additionalProperties: true

    ModelAuthSessionInputRequest:
      type: object
      additionalProperties: true

    ModelAuthSessionResponse:
      type: object
      additionalProperties: true

    ModelConfigActionResponse:
      type: object
      properties:
        status: { type: string }
        modelConfig:
          $ref: "#/components/schemas/ModelConfigOverview"
        overview:
          $ref: "#/components/schemas/ProductOverview"
        epoch: { type: string }
        revision: { type: integer }
        settled: { type: boolean }

    LocalModelRuntimeActionResponse:
      type: object
      properties:
        action: { type: string, enum: [install, repair] }
        status: { type: string, enum: [completed, failed, in-progress] }
        message: { type: string }
        localRuntime:
          $ref: "#/components/schemas/LocalModelRuntimeOverview"
        modelConfig:
          $ref: "#/components/schemas/ModelConfigOverview"
        overview:
          $ref: "#/components/schemas/ProductOverview"
        epoch: { type: string }
        revision: { type: integer }
        settled: { type: boolean }

    # ── Channels ──────────────────────────────────────────────────────────

    ChannelConfigOverview:
      type: object
      additionalProperties: true

    SaveChannelEntryRequest:
      type: object
      additionalProperties: true

    RemoveChannelEntryRequest:
      type: object
      properties:
        entryId: { type: string }

    ChannelSessionInputRequest:
      type: object
      additionalProperties: true

    ChannelSessionResponse:
      type: object
      additionalProperties: true

    ChannelConfigActionResponse:
      type: object
      additionalProperties: true

    # ── Plugins ───────────────────────────────────────────────────────────

    PluginConfigOverview:
      type: object
      additionalProperties: true

    PluginActionResponse:
      type: object
      additionalProperties: true

    # ── Skills ────────────────────────────────────────────────────────────

    SkillCatalogOverview:
      type: object
      additionalProperties: true

    InstallSkillRequest:
      type: object
      additionalProperties: true

    SaveCustomSkillRequest:
      type: object
      additionalProperties: true

    UpdateSkillRequest:
      type: object
      additionalProperties: true

    RemoveSkillRequest:
      type: object
      additionalProperties: true

    SkillCatalogActionResponse:
      type: object
      additionalProperties: true

    SkillMarketplaceEntry:
      type: object
      additionalProperties: true

    SkillMarketplaceDetail:
      type: object
      additionalProperties: true

    InstalledSkillDetail:
      type: object
      additionalProperties: true

    # ── Tasks ─────────────────────────────────────────────────────────────

    EngineTaskRequest:
      type: object
      required: [prompt, profileId]
      properties:
        prompt: { type: string }
        profileId: { type: string }
        templateId: { type: string }
        memberId: { type: string }
        memberAgentId: { type: string }

    EngineTaskResult:
      type: object
      properties:
        taskId: { type: string }
        title: { type: string }
        status: { type: string, enum: [running, completed, failed] }
        summary: { type: string }
        output: { type: string }
        nextActions:
          type: array
          items: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        steps:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              label: { type: string }
              status: { type: string, enum: [pending, running, done] }

    # ── Chat ──────────────────────────────────────────────────────────────

    ChatOverview:
      type: object
      additionalProperties: true

    CreateChatThreadRequest:
      type: object
      additionalProperties: true

    ChatActionResponse:
      type: object
      additionalProperties: true

