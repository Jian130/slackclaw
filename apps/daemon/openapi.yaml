          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelAuthSessionResponse"

  /models/auth/session/{sessionId}/input:
    post:
      operationId: submitModelAuthSessionInput
      tags: [models]
      summary: Submit input for an interactive model auth session
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelAuthSessionInputRequest"
      responses:
        "200":
          description: ModelAuthSessionResponse
          content:
            application/json:
