        "200":
          description: ModelConfigActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelConfigActionResponse"

  /models/fallbacks:
    post:
      operationId: replaceFallbackModelEntries
      tags: [models]
      summary: Replace the ordered list of fallback model entries
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceFallbackModelEntriesRequest"
      responses:
        "200":
          description: ModelConfigActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelConfigActionResponse"

  /models/auth:
    post:
      operationId: authenticateModelProvider
      tags: [models]
