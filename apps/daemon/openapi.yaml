  /onboarding/navigate:
    post:
      operationId: navigateOnboardingStep
      tags: [onboarding]
      summary: Navigate to a specific onboarding step
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingStepNavigationRequest"
      responses:
        "200":
          description: OnboardingStateResponse
          content:
            application/json:
              schema:
