      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelAuthSessionInputRequest"
      responses:
        "200":
          description: ModelAuthSessionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelAuthSessionResponse"

  /onboarding/model/reset:
    post:
      operationId: resetOnboardingModelDraft
      tags: [onboarding]
      summary: Reset the model draft in onboarding
      responses:
        "200":
          description: OnboardingStateResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStateResponse"

  /onboarding/channel/entries:
    post:
      operationId: saveOnboardingChannelEntry
      tags: [onboarding]
      summary: Create a channel entry during onboarding
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveChannelEntryRequest"
      responses:
        "200":
          description: ChannelConfigActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelConfigActionResponse"

  /onboarding/channel/entries/{entryId}:
    patch:
      operationId: updateOnboardingChannelEntry
      tags: [onboarding]
      summary: Update a channel entry during onboarding
      parameters:
        - $ref: "#/components/parameters/entryId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveChannelEntryRequest"
      responses:
        "200":
          description: ChannelConfigActionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelConfigActionResponse"

  /onboarding/channel/session/{sessionId}:
    get:
      operationId: getOnboardingChannelSession
      tags: [onboarding]
      summary: Poll a channel setup session during onboarding
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: ChannelSessionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelSessionResponse"

  /onboarding/channel/session/{sessionId}/input:
    post:
      operationId: submitOnboardingChannelSessionInput
      tags: [onboarding]
      summary: Submit input for a channel setup session during onboarding
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelSessionInputRequest"
      responses:
        "200":
          description: ChannelSessionResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelSessionResponse"

  /onboarding/channel/reset:
    post:
      operationId: resetOnboardingChannelDraft
      tags: [onboarding]
      summary: Reset the channel draft in onboarding
      responses:
        "200":
          description: OnboardingStateResponse
