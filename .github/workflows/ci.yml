name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-js:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Run contracts tests
        run: npm run test:contracts

      - name: Run daemon tests
        run: npm run test:daemon

      - name: Run desktop UI tests
        run: npm run test:desktop-ui

      - name: Run website tests
        run: npm run test:website

      - name: Run release script tests
        run: npm run test:scripts

  validate-macos-native:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native macOS client
        run: npm run build:mac-native

      - name: Run native macOS tests
        run: npm run test:mac-native

  smoke-macos-installer:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate-js
      - validate-macos-native
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packaged macOS installer
        run: npm run build:mac-installer
