name: macOS Release

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    environment:
      name: macos-app
    runs-on: macos-26
    env:
      APP_PATH: dist/.macos-staging/ChillClaw.app
      DAEMON_ENTITLEMENTS: scripts/macos-daemon-entitlements.plist
      NODE_RUNTIME_ENTITLEMENTS: scripts/macos-node-runtime-entitlements.plist
      INSTALLER_PATH: dist/macos/ChillClaw-macOS.dmg
      CHECKSUM_PATH: dist/macos/ChillClaw-macOS.dmg.sha256.txt
      RUNTIME_UPDATE_FEED_PATH: dist/macos/runtime-update.json
      CHILLCLAW_RUNTIME_UPDATE_FEED_URL: https://github.com/Jian130/chillclaw/releases/latest/download/runtime-update.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Verify stable tag matches package version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG_WITH_PREFIX="v${PACKAGE_VERSION}"
          EXPECTED_TAG_BARE="${PACKAGE_VERSION}"

          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG_WITH_PREFIX}" ] && [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG_BARE}" ]; then
            echo "Expected release tag ${EXPECTED_TAG_WITH_PREFIX} or ${EXPECTED_TAG_BARE}, got ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build workspaces
        run: npm run build

      - name: Run JavaScript and website tests
        run: npm test

      - name: Build native macOS client
        run: npm run build:mac-native

      - name: Run native macOS tests
        run: npm run test:mac-native

      - name: Prepare bundled CLI runtime artifacts
        run: npm run prepare:runtime-artifacts

      - name: Stage macOS app bundle
        run: npm run build:mac-installer -- --skip-build --stage-only

      - name: Install Apple signing certificates
        env:
          APP_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/chillclaw-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 18)"
          APP_CERT_PATH="$RUNNER_TEMP/chillclaw-app-cert.p12"
          LOGIN_KEYCHAIN=$(security login-keychain | tr -d '"')

          node -e 'require("node:fs").writeFileSync(process.argv[1], Buffer.from(process.env.APP_CERT_P12_BASE64, "base64"));' "$APP_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APP_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign ChillClaw.app
        env:
          APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
        run: |
          is_node_runtime_executable() {
            case "$1" in
              "$APP_PATH"/Contents/Resources/app/runtime-artifacts/node/node-v*/bin/node) return 0 ;;
              *) return 1 ;;
            esac
          }

          while IFS= read -r -d '' RUNTIME_EXECUTABLE; do
            if file "$RUNTIME_EXECUTABLE" | grep -q 'Mach-O'; then
              if is_node_runtime_executable "$RUNTIME_EXECUTABLE"; then
                codesign --force --sign "$APP_IDENTITY" --options runtime --timestamp --entitlements "$NODE_RUNTIME_ENTITLEMENTS" "$RUNTIME_EXECUTABLE"
              else
                codesign --force --sign "$APP_IDENTITY" --options runtime --timestamp "$RUNTIME_EXECUTABLE"
              fi
            fi
          done < <(find "$APP_PATH/Contents/Resources/app/runtime-artifacts" -type f -print0)
          codesign --force --sign "$APP_IDENTITY" --options runtime --timestamp --entitlements "$DAEMON_ENTITLEMENTS" "$APP_PATH/Contents/Resources/runtime/chillclaw-daemon"
          codesign --force --sign "$APP_IDENTITY" --options runtime --timestamp "$APP_PATH/Contents/MacOS/ChillClaw"
          codesign --force --sign "$APP_IDENTITY" --options runtime --timestamp "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Build signed disk image
        env:
          APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
        run: |
          rm -f "$INSTALLER_PATH"
          npm run build:mac-installer -- --skip-build --dmg-only
          codesign --force --sign "$APP_IDENTITY" --timestamp "$INSTALLER_PATH"
          codesign --verify --verbose=2 "$INSTALLER_PATH"

      - name: Notarize and staple disk image
        env:
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          parse_notary_field() {
            local field="$1"
            node -e '
          const field = process.argv[1];
          let input = "";
          process.stdin.setEncoding("utf8");
          process.stdin.on("data", (chunk) => {
            input += chunk;
          });
          process.stdin.on("end", () => {
            const payload = JSON.parse(input);
            const value = payload[field];
            if (value) {
              process.stdout.write(String(value));
            }
          });
          ' "$field"
          }

          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          node -e 'require("node:fs").writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_NOTARY_API_KEY_BASE64, "base64"));' "$NOTARY_KEY_PATH"

          NOTARY_RESULT="$(xcrun notarytool submit "$INSTALLER_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"
          printf '%s\n' "$NOTARY_RESULT"

          NOTARY_STATUS="$(printf '%s\n' "$NOTARY_RESULT" | parse_notary_field status)"
          NOTARY_SUBMISSION_ID="$(printf '%s\n' "$NOTARY_RESULT" | parse_notary_field id)"
          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            if [[ -n "$NOTARY_SUBMISSION_ID" ]]; then
              xcrun notarytool log "$NOTARY_SUBMISSION_ID" \
                --key "$NOTARY_KEY_PATH" \
                --key-id "$APPLE_NOTARY_KEY_ID" \
                --issuer "$APPLE_NOTARY_ISSUER_ID" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            echo "Apple notarization finished with status ${NOTARY_STATUS:-unknown}; not stapling invalid DMG." >&2
            exit 1
          fi

          xcrun stapler staple "$INSTALLER_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$INSTALLER_PATH"

      - name: Generate installer checksum
        run: |
          shasum -a 256 "$INSTALLER_PATH" > "$CHECKSUM_PATH"
          test -s "$INSTALLER_PATH"
          test -s "$CHECKSUM_PATH"

      - name: Generate runtime update feed
        run: |
          npm run build:runtime-update-feed -- --release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          test -s "$RUNTIME_UPDATE_FEED_PATH"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -X POST \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > release-notes.md

          cat >> release-notes.md <<'EOF'

          Installer assets:
          - `ChillClaw-macOS.dmg`
          - `ChillClaw-macOS.dmg.sha256.txt`
          - `runtime-update.json`
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "ChillClaw ${{ steps.version.outputs.package_version }}" \
              --notes-file release-notes.md \
              --latest
            gh release upload "${GITHUB_REF_NAME}" \
              "$INSTALLER_PATH" \
              "$CHECKSUM_PATH" \
              "$RUNTIME_UPDATE_FEED_PATH" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "$INSTALLER_PATH" \
              "$CHECKSUM_PATH" \
              "$RUNTIME_UPDATE_FEED_PATH" \
              --title "ChillClaw ${{ steps.version.outputs.package_version }}" \
              --notes-file release-notes.md \
              --latest
          fi
