name: macOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run build:mac-installer

      - name: Generate installer checksum
        run: shasum -a 256 dist/macos/ChillClaw-macOS.pkg > dist/macos/ChillClaw-macOS.pkg.sha256.txt

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          First public ChillClaw macOS installer build.

          Included assets:
          - ChillClaw-macOS.pkg
          - ChillClaw-macOS.pkg.sha256.txt

          Notes:
          - This installer is currently unsigned and not notarized.
          - macOS may require an explicit Gatekeeper override during first launch.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/macos/ChillClaw-macOS.pkg \
            dist/macos/ChillClaw-macOS.pkg.sha256.txt \
            --title "ChillClaw ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --prerelease
